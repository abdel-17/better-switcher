name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project BetterSwitcher.xcodeproj \
            -scheme BetterSwitcher \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Create zip archive
        run: |
          cd "build/Build/Products/Release"
          zip -r "../../../../BetterSwitcher-${GITHUB_REF_NAME}.zip" "BetterSwitcher.app"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "BetterSwitcher-$GITHUB_REF_NAME.zip" --generate-notes
